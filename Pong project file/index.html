<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pong</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body data-theme="dark">
<div id="game-container">
<canvas id="game-canvas" width="1280" height="720"></canvas>

<div id="start-screen">
<div class="start-panel">
<h1 class="title">Pong</h1>
<p class="subtitle">Left: W / S &nbsp; | &nbsp; Right: ↑ / ↓</p>

<div class="control-row">
<span>Mode</span>
<label>
<input type="radio" name="mode" value="single" checked />
Single
</label>
<label>
<input type="radio" name="mode" value="double" />
Double
</label>
</div>

<div class="control-row">
<span>Theme</span>
<label>
<input type="radio" name="theme" value="dark" checked />
Dark
</label>
<label>
<input type="radio" name="theme" value="light" />
Light
</label>
</div>

<div
class="control-row"
id="player-names-row"
style="display: none;"
>
<input
id="player-left-name"
type="text"
placeholder="Left player name"
/>
<input
id="player-right-name"
type="text"
placeholder="Right player name"
/>
</div>

<div class="control-row">
<label for="ball-speed">Ball speed</label>
<input
id="ball-speed"
type="range"
min="0.5"
max="2"
step="0.25"
value="1"
/>
<span id="ball-speed-value">1.0×</span>
</div>

<button id="start-button">Start</button>
</div>
</div>

<div id="controls-bar" class="hidden">
<button id="play-button" disabled>Play</button>
<button id="pause-button" disabled>Pause</button>
<button id="stop-button" disabled>Stop</button>
</div>

<div id="highscore-screen" class="hidden">
<div class="start-panel highscore-panel">
<h2 class="title">High Scores</h2>
<ol id="highscore-list"></ol>
<button id="highscore-continue-button">Back to Start</button>
</div>
</div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
